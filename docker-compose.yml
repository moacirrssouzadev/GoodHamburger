services:
  api:
    image: goodhamburger-api
    build:
      context: ./GoodHamburger-Api
      dockerfile: src/GoodHamburger.API/Dockerfile
    container_name: goodhamburger-api
    restart: on-failure
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/GoodHamburger.db
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend

  web:
    image: goodhamburger-web
    build:
      context: ./GoodHamburger-Web
      dockerfile: Dockerfile
    container_name: goodhamburger-web
    restart: on-failure
    ports:
      - "5246:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

volumes:
  sqlite_data:

networks:
  backend:
    driver: bridge
